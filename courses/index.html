<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Learning Portal - Portafolio de Carlos Julcapoma</title>
    <meta name="description" content="Una lista curada de cursos online para descubrir y compartir.">
    <link rel="icon" href="../favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <div class="header-left">
            <a href="../" class="back-link">← Volver</a>
            <h1>Tech Learning Portal</h1>
        </div>
        <div class="header-right">
            <input type="search" id="search-bar" placeholder="Buscar por título, tecnología o plataforma...">
        </div>
    </header>
    <main>
        <section id="hero">
            <h2 class="hero-title">Explora el catálogo de cursos</h2>
            <p class="hero-subtitle">Recursos de aprendizaje para roles tecnológicos en plataformas como Microsoft Learn, LinkedIn Learning, YouTube y más.</p>
        </section>

        <!-- Controls Bar: Filters and Grouping -->
        <div id="controls-bar">
            <div class="filter-group">
                <label for="filter-platform">Plataforma:</label>
                <select id="filter-platform">
                    <option value="">Todas</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filter-category">Área profesional:</label>
                <select id="filter-category">
                    <option value="">Todos</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filter-language">Idioma:</label>
                <select id="filter-language">
                    <option value="">Todos</option>
                    <option value="ES">Español</option>
                    <option value="EN">Inglés</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filter-level">Nivel:</label>
                <select id="filter-level">
                    <option value="">Todos</option>
                    <option value="Básico">Básico</option>
                    <option value="Intermedio">Intermedio</option>
                    <option value="Avanzado">Avanzado</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="group-by">Agrupar por:</label>
                <select id="group-by">
                    <option value="">Ninguno</option>
                    <option value="plataforma">Plataforma</option>
                    <option value="categoria">Área profesional</option>
                </select>
            </div>
        </div>
        <div id="results-counter">Mostrando 26 cursos</div>
        <div id="board-container" class="course-grid"></div>
    </main>
    <script src="app.js"></script>
</body>

</html>
